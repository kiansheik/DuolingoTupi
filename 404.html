<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var prefix = "/DuolingoTupi/";
      var path = window.location.pathname || "";
      var tail = "";
      if (path === "/DuolingoTupi" || path === "/DuolingoTupi/") {
        tail = "";
      } else if (path.startsWith(prefix)) {
        tail = path.slice(prefix.length);
      }
      var target = "https://tama.academiatupi.com";
      if (tail) {
        target += "/" + tail;
      }
      target += window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Not found.</p>
</body>
</html>
